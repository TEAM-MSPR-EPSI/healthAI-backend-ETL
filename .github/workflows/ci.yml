name: CI/CD Pipeline automatique

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [dev, main]

jobs:

  #build
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

  #linter
  linter:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --max-line-length=200 --exclude=.git,__pycache__,.venv

#tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: echo "${{ secrets.ETL_ENV_FILE }}" > .env

      - name: Debug - check resolved env vars
        if: always()
        run: docker compose -f docker-compose.test.yml config | grep -A3 "POSTGRES"

      - name: Start containers (wait until healthy)
        run: docker compose -f docker-compose.test.yml up -d --build --wait

      - name: Show database logs
        if: always()
        run: docker logs postgres_db

      - name: Run tests
        run: docker exec etl_backend pytest tests.py

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down